<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Дашборд — LMFS Log Parser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    .level-card { border-left: 4px solid; cursor: pointer; transition: box-shadow .15s; }
    .level-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .level-Info  { border-color: #0d6efd; }
    .level-Warn  { border-color: #fd7e14; }
    .level-Error { border-color: #dc3545; }
    .level-Debug { border-color: #6c757d; }
    .count-num { font-size: 2rem; font-weight: 700; }
    .detail-card { background:#f8f9fa; border-left:4px solid #0d6efd; padding:.75rem; font-size:.8rem; }
    .log-row { cursor: pointer; }
    .log-row:hover { background: #f8f9fa; }
  </style>
</head>
<body class="d-flex flex-column vh-100">

<nav class="navbar navbar-dark bg-dark px-3 py-2 flex-shrink-0">
  <span class="navbar-brand mb-0 h6">LMFS Log Parser — Дашборд</span>
  <div class="d-flex gap-2">
    <a href="/" class="btn btn-sm btn-outline-light">← Логи</a>
    <a href="/settings.html" class="btn btn-sm btn-outline-secondary">⚙</a>
  </div>
</nav>

<div class="bg-light border-bottom px-3 py-2 flex-shrink-0">
  <div class="d-flex align-items-center gap-3 flex-wrap">
    <span class="text-muted small" id="path-label"></span>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <label class="form-label mb-0 small">Дата от</label>
      <input type="date" class="form-control form-control-sm" id="date-from" style="width:145px">
      <label class="form-label mb-0 small">до</label>
      <input type="date" class="form-control form-control-sm" id="date-to" style="width:145px">
      <button class="btn btn-sm btn-primary" id="load-btn">Загрузить</button>
    </div>
  </div>
</div>

<div class="flex-grow-1 overflow-auto p-3">
  <div id="no-path" class="text-center text-muted mt-5" style="display:none">
    Путь не выбран — откройте <a href="/">главную страницу</a> и укажите папку
  </div>

  <!-- Level cards -->
  <div class="row g-3 mb-4" id="level-cards"></div>

  <!-- Chart -->
  <div class="card mb-4" id="chart-card" style="display:none">
    <div class="card-header small fw-semibold">Распределение по часам</div>
    <div class="card-body" style="height:280px">
      <canvas id="hourChart"></canvas>
    </div>
  </div>
</div>

<!-- Entries modal -->
<div class="modal fade" id="entries-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="entries-modal-title"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <table class="table table-sm table-hover table-bordered mb-0">
          <thead class="table-light sticky-top">
            <tr id="entries-thead-row"></tr>
          </thead>
          <tbody id="entries-tbody"></tbody>
        </table>
      </div>
      <div class="modal-footer gap-2 flex-wrap">
        <small class="text-muted me-auto" id="entries-count"></small>
        <button class="btn btn-sm btn-outline-secondary" id="modal-prev-btn">←</button>
        <span class="small" id="modal-page-label">Стр. 1</span>
        <button class="btn btn-sm btn-outline-secondary" id="modal-next-btn">→</button>
        <select class="form-select form-select-sm" id="modal-page-size" style="width:80px">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
        </select>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
