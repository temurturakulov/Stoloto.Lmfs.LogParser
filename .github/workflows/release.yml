name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish src/Stoloto.LogParser.Web/Stoloto.LogParser.Web.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Show publish contents
        run: Get-ChildItem publish -Recurse | Select-Object FullName

      - name: Zip artifact
        run: Compress-Archive -Path publish/* -DestinationPath LogParser-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LogParser-${{ github.ref_name }}.zip
          generate_release_notes: true
